<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日月潭互動劇院 - 終極完整版</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; overflow-x: hidden; background-color: #020617; color: white; }
        .progress-track { height: 32px; background: rgba(255, 255, 255, 0.05); border-radius: 99px; position: relative; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.1); }
        .green-bar { height: 100%; background: linear-gradient(90deg, #10b981, #34d399); transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 0 20px rgba(16, 185, 129, 0.5); }
        .red-bar { height: 100%; background: linear-gradient(90deg, #ef4444, #f87171); transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 0 20px rgba(239, 68, 68, 0.5); }
        .theater-frame { border: 12px solid #ffffff; border-radius: 4rem; box-shadow: 0 60px 150px -30px rgba(0, 0, 0, 1); }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 3.5rem; }
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        .video-overlay { animation: fade-in 0.8s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        const AUDIO_ASSETS = { bgm: "./bgm.mp3" };
        const VIDEO_ASSETS = {
            green: "./greenwin.mp4",
            red: "./redwin.mp4"
        };

        const milestones = [
            { id: 1, segment: 0, name: "01 慈恩塔 (起點)", image: "01-慈恩塔.jpg", history: "1971年完工，蔣公感念母恩興建。塔頂海拔剛好達1000公尺。", geography: "位於海拔954公尺的青龍山頂，塔高46公尺。可俯瞰全潭。", culture: "環湖競跑最具指標性的起點，象徵中華文化中的孝親精神。" },
            { id: 2, segment: 5, name: "02 玄奘寺", image: "02.jpg", history: "1965年落成，奉安玄奘大師靈骨舍利。建築採仿唐式設計。", geography: "座落在青龍山半山腰，前臨潭水、後依群山，位置優越。", culture: "莊嚴肅穆。是跑者在陡坡後調整呼吸的重要休息點。" },
            { id: 3, segment: 10, name: "03 玄光碼頭", image: "03-.jpg", history: "曾是暫存玄奘舍利的場所，現以「阿婆茶葉蛋」聞名全台。", geography: "位於日潭與月潭交界，可近距離觀看邵族聖地拉魯島。", culture: "碼頭旁的日月潭石碑是所有挑戰者必拍的地標。" },
            { id: 4, segment: 15, name: "04 土亭仔步道口", image: "04.jpg", history: "邵族語意指很多土堆的地方，曾是邵族重要的聚落。", geography: "路徑兩側有茂密的森林。盡頭擁有全台最小、海拔最高燈桿。", culture: "入口的貓頭鷹石像是邵族守護神。充滿森林靜謐感。" },
            { id: 5, segment: 20, name: "05 伊達邵碼頭", image: "05.jpg", history: "原名德化社，為邵族聚居中心。現為繁榮的文化商業核心。", geography: "潭區最大的平地聚落。是跑者路程 1/4 的重要補給站。", culture: "每年農曆八月舉行祖靈祭。建築充滿濃厚邵族圖騰風格。" },
            { id: 6, segment: 25, name: "06 日月潭纜車站", image: "06.jpg", history: "2009年營運，連結日月潭與九族。注入現代化觀光動能。", geography: "跨越水社大山支脈。站體圓弧鋼構建築在山水間非常醒目。", culture: "彩色纜車象徵潭區四季變換，是科技與美景的交織。" },
            { id: 7, segment: 30, name: "07 水蛙頭步道 (九蛙)", image: "07.jpg", history: "九蛙疊像由藝術家沈政瑩設計。現為全球關注的水位指標。", geography: "位於內湖仔灣內，是觀察潭水發電與水位變化的最佳窗口。", culture: "九蛙現身代表水情變化，是結合教育與觀光的成功標誌。" },
            { id: 8, segment: 35, name: "08 大竹湖 (進水口)", image: "08.jpg", history: "日治時期修築引水隧道將濁水溪水引入，是重要工程遺跡。", geography: "潭水湧出處形成了湧泉，發展出豐富的溼地生態景觀。", culture: "見證日月潭從天然湖泊轉變為水利發電重鎮的歷史。" },
            { id: 9, segment: 40, name: "09 文武廟", image: "09.jpg", history: "1969年重建為現今壯闊規模。紅色牌樓氣勢磅礡、華麗。", geography: "座落在潭北山腰，氣勢非凡。擁有著名的年梯步道。", culture: "路程過半！北朝宮廷式建築藝術是環湖最具震撼的地標。" },
            { id: 10, segment: 45, name: "10 雲品/萬麗酒店一帶", image: "10.jpg", history: "日月潭北岸觀光重心。現代化高級酒店與寧靜湖景共存。", geography: "公路在此呈現平緩弧線，視野開闊。可遠眺南岸慈恩塔。", culture: "國際觀光接軌面貌。對跑者而言是放鬆的精華平路。" },
            { id: 11, segment: 50, name: "11 朝霧碼頭", image: "11.jpg", history: "曾是重要水路中心。因清晨霧氣繚繞美景而得名。", geography: "面向東方，觀賞日出最佳點。也是泊船區最大的碼頭。", culture: "每年萬人橫渡下水點。象徵著挑戰自我的勇氣與精神。" },
            { id: 12, segment: 55, name: "12 水社碼頭", image: "12.jpg", history: "最早開發的據點，也是環湖地區交通與服務最核心之處。", geography: "地勢平坦，飯店林立。是補給最完善、人潮最集中的區塊。", culture: "匯集潭區活力。跑者在此能獲得獲得最多加油鼓勵。" },
            { id: 13, segment: 60, name: "13 向山遊客中心", image: "13.jpg", history: "由日本建築師團紀彥設計。清水模結構本身即是藝術品。", geography: "雙手環抱湖水的流線型設計。無邊際水池與藍天共構禪意。", culture: "路程達 3/4。現代美學與自然生態共存的經典地標。" },
            { id: 14, segment: 65, name: "14 向山眺望平台", image: "14.jpg", history: "2014年啟用的懸臂式平台。透過創新鋼構延伸至湖心。", geography: "懸空湖面 10 公尺處。直對拉魯島，形成神聖的視覺軸線。", culture: "站在平台上如同站在湖中心。是與潭水深度對話的時刻。" },
            { id: 15, segment: 70, name: "15 月牙灣 (月潭段)", image: "15.jpg", history: "相對寧靜的私房景點。展現迷人的半月型弧線與清澈潭水。", geography: "湖岸形狀如新月。車流極少，是划船與立槳愛好者的天堂。", culture: "遠離喧囂。在競跑後期，給予跑者最溫柔的心靈支持。" },
            { id: 16, segment: 75, name: "16 頭社壩附近", image: "16.jpg", history: "區隔主潭與頭社盆地的重要堤壩。壩頂草皮綠意盎然。", geography: "地勢開闊，視野極佳。可同時欣賞潭面與集集大山美景。", culture: "最後一塊拼圖。看到這片美麗草坡，代表挑戰即將圓滿完成。" },
            { id: 17, segment: 80, name: "17 回到起點 (終點)", image: "17.jpg", history: "完成環湖壯舉。最後回到慈恩塔下的台地，領取榮耀。", geography: "海拔 1000 公尺的終點線。全潭最寧靜、莊嚴的時刻。", culture: "堅持到底、永不放棄。恭喜你完成了這場精彩的競跑之旅！" }
        ];

        function App() {
            const [greenProgress, setGreenProgress] = useState(0);
            const [redProgress, setRedProgress] = useState(0);
            const [mqttStatus, setMqttStatus] = useState("connecting");
            const [showTools, setShowTools] = useState(false);
            
            const mqttClient = useRef(null);
            const bgmAudio = useRef(new Audio(AUDIO_ASSETS.bgm));

            useEffect(() => {
                bgmAudio.current.loop = true;
                bgmAudio.current.volume = 0.5;
            }, []);

            useEffect(() => {
                const client = window.mqtt.connect("wss://mqttgo.io:8084/mqtt", { clean: true });
                client.on("connect", () => { setMqttStatus("connected"); client.subscribe("sml/runner/progress"); });
                client.on("message", (t, m) => {
                    const raw = m.toString().trim();
                    if (raw.includes(',')) {
                        const [g, r] = raw.split(',').map(Number);
                        if (!isNaN(g)) setGreenProgress(Math.min(80, g));
                        if (!isNaN(r)) setRedProgress(Math.min(80, r));
                    }
                });
                mqttClient.current = client;
                return () => client.end();
            }, []);

            useEffect(() => {
                const isGameOver = greenProgress >= 80 || redProgress >= 80;
                const isGameActive = (greenProgress > 0 || redProgress > 0) && !isGameOver;

                if (isGameOver) {
                    bgmAudio.current.pause();
                } else if (isGameActive) {
                    if (bgmAudio.current.paused) bgmAudio.current.play().catch(() => {});
                } else {
                    bgmAudio.current.pause();
                    bgmAudio.current.currentTime = 0;
                }
            }, [greenProgress, redProgress]);

            const leaderProgress = Math.max(greenProgress, redProgress);
            const data = milestones[Math.floor(leaderProgress / 5)] || milestones[16];
            const winnerTeam = greenProgress >= 80 ? "green" : redProgress >= 80 ? "red" : null;

            return (
                <div className="flex flex-col min-h-screen bg-slate-950 text-left" onClick={() => bgmAudio.current.play().catch(()=>{})}>
                    
                    <header className="px-10 py-8 flex justify-between items-center bg-slate-900 border-b border-white/10 sticky top-0 z-50">
                        <div className={`flex flex-col items-center px-12 py-5 rounded-[2.5rem] bg-white/5 border-2 ${greenProgress > redProgress ? 'border-emerald-500' : 'border-transparent'}`}>
                            <p className="text-emerald-400 font-black italic text-xl">TEAM GREEN</p>
                            <span className="text-8xl font-black italic">{greenProgress} / 80</span>
                        </div>
                        <div className="text-center">
                            <h1 className="text-6xl font-black italic tracking-tighter">日月潭環湖競賽</h1>
                            <div className="flex items-center justify-center gap-3 mt-2">
                                <div className={`w-3 h-3 rounded-full ${mqttStatus === 'connected' ? 'bg-emerald-500 shadow-[0_0_15px_#10b981]' : 'bg-red-500 animate-pulse'}`}></div>
                                <p className="text-sm text-slate-500 font-bold tracking-widest">LIVE BROADCAST</p>
                            </div>
                        </div>
                        <div className={`flex flex-col items-center px-12 py-5 rounded-[2.5rem] bg-white/5 border-2 ${redProgress > greenProgress ? 'border-red-500' : 'border-transparent'}`}>
                            <p className="text-red-500 font-black italic text-xl">TEAM RED</p>
                            <span className="text-8xl font-black italic">{redProgress} / 80</span>
                        </div>
                        <button onClick={(e) => { e.stopPropagation(); setShowTools(true); }} className="absolute top-4 right-4 p-4 text-slate-700 hover:text-white transition-all">⚙️</button>
                    </header>

                    <main className="flex-grow flex flex-col items-center px-12 py-10 w-full max-w-screen-2xl mx-auto">
                        
                        {showTools && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/90 backdrop-blur-xl">
                                <div className="glass-panel p-20 text-center border border-white/10">
                                    <h2 className="text-5xl font-black mb-10 text-blue-400 italic">系統中控台</h2>
                                    <div className="flex flex-col gap-6">
                                        <button onClick={() => { mqttClient.current.publish("sml/runner/progress", "10,5"); }} className="bg-blue-600 p-8 rounded-3xl text-2xl font-black text-white">發送測試 (比賽中)</button>
                                        <button onClick={() => { mqttClient.current.publish("sml/runner/progress", "80,75"); }} className="bg-emerald-600 p-8 rounded-3xl text-2xl font-black text-white">測試綠隊勝利 (.mp4)</button>
                                        <button onClick={() => { mqttClient.current.publish("sml/runner/progress", "75,80"); }} className="bg-red-600 p-8 rounded-3xl text-2xl font-black text-white">測試紅隊勝利 (.mp4)</button>
                                        <button onClick={() => setShowTools(false)} className="bg-white text-black p-6 rounded-3xl text-2xl font-black">返回轉播</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 照片主區 */}
                        <div className="w-full relative aspect-[16/8.5] theater-frame overflow-hidden bg-slate-900 shadow-2xl">
                            <img key={data.image} src={data.image} className="w-full h-full object-cover transition-opacity duration-700" onError={(e) => { e.target.src="01-慈恩塔.jpg"; }} />
                            <div className="absolute inset-0 bg-gradient-to-t from-black/95 via-transparent to-transparent" />
                            <div className="absolute bottom-12 left-16 text-left">
                                <span className="bg-blue-600 px-8 py-2 rounded-full text-xl font-black uppercase tracking-widest mb-6 inline-block">POINT {data.id}</span>
                                <h2 className="text-[8.5rem] font-black italic leading-[0.8] drop-shadow-2xl">{data.name}</h2>
                            </div>
                        </div>

                        {/* 進度條 */}
                        <div className="w-full mt-12 glass-panel p-12 shadow-3xl">
                            <div className="flex flex-col gap-10">
                                <div className="flex items-center gap-12">
                                    <p className="text-3xl font-black text-emerald-400 w-64 italic">Team Green</p>
                                    <div className="flex-grow progress-track"><div className="green-bar" style={{ width: (greenProgress/80)*100 + "%" }}></div></div>
                                    <p className="text-4xl font-mono font-black text-emerald-300 w-24 text-right">{(greenProgress/80*100).toFixed(0)}%</p>
                                </div>
                                <div className="flex items-center gap-12">
                                    <p className="text-3xl font-black text-red-500 w-64 italic">Team Red</p>
                                    <div className="flex-grow progress-track"><div className="red-bar" style={{ width: (redProgress/80)*100 + "%" }}></div></div>
                                    <p className="text-4xl font-mono font-black text-red-400 w-24 text-right">{(redProgress/80*100).toFixed(0)}%</p>
                                </div>
                            </div>
                        </div>

                        {/* 人文背景資訊卡片 - 這裡重新補齊了！ */}
                        <div className="w-full mt-16 grid grid-cols-1 md:grid-cols-3 gap-12 pb-48">
                            <div className="glass-panel p-12 border-l-[20px] border-blue-600 shadow-2xl hover:bg-blue-600/5 transition-all">
                                <h4 className="text-xl font-black text-blue-500 uppercase tracking-[0.3em] mb-8 italic flex items-center gap-4">
                                    <div className="w-4 h-4 bg-blue-500 rounded-full"></div> 歷史背景 History
                                </h4>
                                <p className="text-4xl text-white font-bold leading-tight tracking-tight underline underline-offset-[15px] decoration-blue-500/20">{data.history}</p>
                            </div>
                            <div className="glass-panel p-12 border-l-[20px] border-emerald-500 shadow-2xl hover:bg-emerald-600/5 transition-all">
                                <h4 className="text-xl font-black text-emerald-500 uppercase tracking-[0.3em] mb-8 italic flex items-center gap-4">
                                    <div className="w-4 h-4 bg-emerald-500 rounded-full"></div> 地理環境 Geography
                                </h4>
                                <p className="text-4xl text-white font-bold leading-tight tracking-tight underline underline-offset-[15px] decoration-emerald-500/20">{data.geography}</p>
                            </div>
                            <div className="glass-panel p-12 border-l-[20px] border-amber-500 shadow-2xl hover:bg-amber-600/5 transition-all">
                                <h4 className="text-xl font-black text-amber-500 uppercase tracking-[0.3em] mb-8 italic flex items-center gap-4">
                                    <div className="w-4 h-4 bg-amber-500 rounded-full"></div> 文化特色 Culture
                                </h4>
                                <p className="text-4xl text-white font-bold leading-tight tracking-tight underline underline-offset-[15px] decoration-amber-500/20">{data.culture}</p>
                            </div>
                        </div>
                    </main>

                    {/* 勝利全螢幕影片層 */}
                    {winnerTeam && (
                        <div className="fixed inset-0 z-[200] bg-black video-overlay flex items-center justify-center">
                            <video src={VIDEO_ASSETS[winnerTeam]} className="w-full h-full object-cover" autoPlay playsInline />
                            <div className="absolute bottom-24 left-0 right-0 flex flex-col items-center">
                                <h2 className={`text-[11rem] font-black italic mb-10 drop-shadow-[0_0_50px_rgba(0,0,0,1)] ${winnerTeam === 'green' ? 'text-emerald-400' : 'text-red-500'}`}>
                                    {winnerTeam === 'green' ? '綠隊' : '紅隊'} 勝利！
                                </h2>
                                <button 
                                    onClick={() => { setGreenProgress(0); setRedProgress(0); }} 
                                    className="bg-yellow-500 hover:bg-yellow-400 text-black px-32 py-10 rounded-full text-5xl font-black shadow-2xl transition-transform active:scale-95"
                                >
                                    REPLAY RACE
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
