<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日月潭環湖競跑導覽系統 - MQTT 互動版</title>
    <!-- 載入 React, Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 載入 MQTT.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; overflow-x: hidden; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 28px; width: 28px; border-radius: 50%;
            background: #2563eb; cursor: pointer; border: 3px solid white;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.4);
        }
        .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-content { animation: fadeIn 0.6s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const TOTAL_SEGMENTS = 80;
        const TOTAL_DISTANCE_KM = 29;
        const SEGMENT_DISTANCE = TOTAL_DISTANCE_KM / TOTAL_SEGMENTS;

        // MQTT 設定 - 使用公共 Broker
        const MQTT_BROKER = "wss://broker.emqx.io:8084/mqtt"; 
        const MQTT_TOPIC = "sml/runner/progress"; // micro:bit 要發送到這個主題

        const milestones = [
            { id: 1, segment: 0, name: "01 慈恩塔 (起點)", image: "01-慈恩塔.jpg", history: "1971年完工，蔣公為感念母恩而興建，所有建材皆由船運過湖再由人工扛上山。", geography: "位於海拔954公尺的青龍山頂，塔高46公尺。由此可俯瞰日月潭全景，呈現「青龍連珠」奇觀。", culture: "傳統寶塔式建築，象徵中華文化中的孝親精神。它是環湖競跑最具指標性的出發點。" },
            { id: 2, segment: 5, name: "02 玄奘寺", image: "02.jpg", history: "1965年落成，奉安玄奘大師靈骨舍利。建築風格採仿唐式設計，莊嚴肅穆。", geography: "座落在青龍山半山腰，前臨潭水、後依群山。您拍的照片中可以看到宏偉的牌樓入口。", culture: "門楣上懸掛「玄奘寺」匾額。這裡不僅是宗教聖地，也是跑者調整呼吸的重要休息點。" },
            { id: 3, segment: 10, name: "03 玄光碼頭", image: "03-.jpg", history: "曾是暫存玄奘舍利的場所。現在以碼頭邊「阿婆茶葉蛋」聞名，是遊客必訪的地標。", geography: "位於日潭與月潭的交界處，可以近距離觀看湖心的拉魯島（邵族聖地）。", culture: "碼頭旁的「日月潭」石碑是跑者留影的首選。照片中可見熱鬧的碼頭拱門與攤位。" },
            { id: 4, segment: 15, name: "04 土亭仔步道口", image: "04.jpg", history: "「土亭仔」邵族語意指很多土堆的地方，曾是邵族重要的聚落與狩獵場所。", geography: "路徑兩側有茂密的森林。步道盡頭擁有全台最小、海拔最高的白色燈桿（燈塔）。", culture: "入口的貓頭鷹石像是邵族的守護神。這一段路程充滿原始森林的靜謐感。" },
            { id: 5, segment: 20, name: "05 伊達邵碼頭", image: "05.jpg", history: "原名「德化社」，為邵族人聚居中心。現在是日月潭最繁榮的文化與商業核心。", geography: "潭區最大的平地聚落。照片中展示了具有邵族風格建築的碼頭廣場與商店街。", culture: "每年農曆八月在此舉行祖靈祭。對於跑者來說，這裡是路程 1/4 的重要補給站。" },
            { id: 6, segment: 25, name: "06 日月潭纜車站", image: "06.jpg", history: "2009年營運，連結日月潭與九族文化村，為潭區觀光注入現代化與科技感。", geography: "跨越水社大山支脈。站體圓弧鋼構建築在照片中顯得極具現代美學。", culture: "彩色纜車象徵潭區的四季變換。這裡是現代科技與自然美景交織的視覺焦點。" },
            { id: 7, segment: 30, name: "07 水蛙頭步道 (九蛙)", image: "07.jpg", history: "步道末端的「九蛙疊像」由藝術家沈政瑩設計。現已成為全球關注的水位觀測指標。", geography: "位於內湖仔灣。照片捕捉了步道口的標示，此處是觀察潭水發電與水位變化的最佳視窗。", culture: "「九蛙現身」代表水情變化，是日月潭結合環境教育與文化觀光的成功標誌。" },
            { id: 8, segment: 35, name: "08 大竹湖 (進水口)", image: "08.jpg", history: "日治時期為了發電，修築15公力的引水隧道將濁水溪水引入潭中，是重要工程遺跡。", geography: "潭水湧出處形成了「湧泉」景觀，同時發展出豐富的溼地生態。照片可見其自然綠意。", culture: "見證了日月潭從天然湖泊轉變為水利發電發電重鎮的歷史進程。" },
            { id: 9, segment: 40, name: "09 文武廟", image: "09.jpg", history: "1938年因水位上升而遷移。1969年重建為現今壯闊規模。照片可見其華麗的紅色牌樓。", geography: "座落在潭北山腰，氣勢磅礡。擁有著名的「年梯步道」，每階代表一年中的一天。", culture: "主祀孔子與關公。其北朝宮廷式建築藝術是環湖北側最震撼的人文景觀。路程過半！" },
            { id: 10, segment: 45, name: "10 雲品/萬麗酒店一帶", image: "10.jpg", history: "此區是日月潭北岸觀光發展重心。照片中展現了現代化的高級酒店與寧靜湖景的共存。", geography: "公路在此處呈現平緩弧線，視野開闊。您可以遠眺南岸的山脈與出發點慈恩塔。", culture: "代表了日月潭與國際觀光接軌的面貌。對跑者而言，這裡是身心最能放鬆的一段平路。" },
            { id: 11, segment: 50, name: "11 朝霧碼頭", image: "11.jpg", history: "曾是重要的交通與貨運碼頭。因清晨霧氣繚繞展現出如夢似幻的「朝霧」美景而得名。", geography: "面向東方，是觀賞日出的最佳點。照片中可見大門牌樓與開闊的泊船區。", culture: "每年「萬人橫渡日月潭」活動的正式下水點。象徵著挑戰自我的勇氣。" },
            { id: 12, segment: 55, name: "12 水社碼頭", image: "12.jpg", history: "日月潭最早開發的商業據點，也是整個環湖地區的交通與服務核心中心。", geography: "地勢平坦。照片展示了熱鬧的石牌樓入口，周圍飯店林立，是補給最完善的地方。", culture: "這裡匯集了潭區的活力。跑者在此通常能獲得最多遊客的加油聲與鼓勵。" },
            { id: 13, segment: 60, name: "13 向山遊客中心", image: "13.jpg", history: "由日本建築師團紀彥設計。清水模結構與湖水融合，本身就是一件巨大的藝術品。", geography: "雙手環抱湖水的流線型設計。照片中的現代建築在藍天與無邊際水池襯托下極具禪意。", culture: "這裡是現代美學與自然生態共存的經典。路程已達 3/4，跑者在此能感受和諧氛圍。" },
            { id: 14, segment: 65, name: "14 向山眺望平台", image: "14.jpg", history: "2014年啟用的懸臂式平台。透過創新的鋼構結構，讓跑者的視角能延伸至湖心上方。", geography: "懸空於湖面約10公尺處。照片捕捉了平台入口，這裡能直對拉魯島，形成視覺中軸線。", culture: "站在平台上如同站在湖中心。這裡是跑者與潭水「深度對話」的絕佳時刻。" },
            { id: 15, segment: 70, name: "15 月牙灣 (月潭段)", image: "15.jpg", history: "這裡是相對寧靜的私房景點。照片展現了迷人的半月型弧線與清澈見底的潭水。", geography: "湖岸形狀如新月。此段車流量極少，是划船與 SUP 立槳愛好者的天堂。", culture: "遠遠離開喧囂。在競跑後期，月牙灣的寧靜能給予跑者最溫柔的心靈支持。" },
            { id: 16, segment: 75, name: "16 頭社壩附近", image: "16.jpg", history: "區隔日月潭主潭與頭社盆地的重要堤壩。照片可見寬廣的壩頂草皮與遠處的山脈。", geography: "地勢開闊，视野極佳。您可以同時欣賞到廣闊潭面與集集大山的翠綠山景。", culture: "這是環湖最後一塊拼圖。看到這片美麗草坡，代表挑戰即將圓滿完成，榮耀就在前方！" },
            { id: 17, segment: 80, name: "17 回到終點：慈恩塔", image: "17.jpg", history: "跑者完成環湖 29 公里的壯舉，最後回到出發點的塔前廣場領取獎牌。", geography: "夕陽西下時的慈恩塔，是全潭最寧靜莊嚴的時刻。", culture: "代表了堅持到底、永不放棄的精神。恭喜你完成了這場跨學科的跑步與科技之旅！" }
        ];

        function App() {
            const [segment, setSegment] = useState(0);
            const [tab, setTab] = useState('info');
            const [mqttStatus, setMqttStatus] = useState("connecting"); // connecting, connected, error

            // MQTT 連線邏輯
            useEffect(() => {
                const client = mqtt.connect(MQTT_BROKER);

                client.on("connect", () => {
                    setMqttStatus("connected");
                    client.subscribe(MQTT_TOPIC);
                    console.log("MQTT Connected to:", MQTT_TOPIC);
                });

                client.on("message", (topic, message) => {
                    const value = parseInt(message.toString());
                    if (!isNaN(value)) {
                        // 限制在 0-80 之間
                        const safeValue = Math.max(0, Math.min(80, value));
                        setSegment(safeValue);
                    }
                });

                client.on("error", () => setMqttStatus("error"));

                return () => client.end(); // 組件移除時斷開連線
            }, []);

            const data = useMemo(() => {
                const idx = Math.floor(segment / 5);
                return milestones[idx] || milestones[milestones.length - 1];
            }, [segment]);

            const dist = (segment * SEGMENT_DISTANCE).toFixed(2);
            const percent = Math.round((segment / TOTAL_SEGMENTS) * 100);

            return (
                <div className="max-w-6xl mx-auto p-4 lg:p-10 min-h-screen flex flex-col">
                    {/* Header Section */}
                    <div className="bg-white rounded-[2.5rem] shadow-xl p-8 mb-10 flex flex-col md:flex-row justify-between items-center border border-slate-100 glass-effect">
                        <div className="flex items-center gap-6">
                            <div className="bg-gradient-to-br from-blue-600 to-indigo-600 p-4 rounded-[1.5rem] text-white shadow-lg shadow-blue-200">
                                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
                            </div>
                            <div>
                                <h1 className="text-3xl font-black text-slate-800 tracking-tight">日月潭環湖競跑導覽</h1>
                                <div className="flex items-center gap-2 mt-1">
                                    <div className={`w-2 h-2 rounded-full ${mqttStatus === 'connected' ? 'bg-emerald-500 animate-pulse' : 'bg-red-500'}`}></div>
                                    <p className="text-slate-400 text-xs font-black uppercase tracking-widest">
                                        MQTT: {mqttStatus === 'connected' ? '已連線 (接收中)' : '連線中...'}
                                    </p>
                                </div>
                            </div>
                        </div>
                        <div className="flex gap-6 mt-6 md:mt-0">
                            <div className="bg-blue-50 px-8 py-4 rounded-[1.5rem] text-center border border-blue-100 shadow-inner">
                                <p className="text-[10px] text-blue-400 font-black uppercase mb-1">進度 Progress</p>
                                <p className="text-3xl font-black text-blue-700">{segment} <span className="text-sm opacity-30">/ 80</span></p>
                            </div>
                            <div className="bg-emerald-50 px-8 py-4 rounded-[1.5rem] text-center border border-emerald-100 shadow-inner">
                                <p className="text-[10px] text-emerald-400 font-black uppercase mb-1">里程 Distance</p>
                                <p className="text-3xl font-black text-emerald-700">{dist} <span className="text-sm opacity-30">KM</span></p>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-10 flex-grow">
                        {/* Left Side: Visuals */}
                        <div className="lg:col-span-7 space-y-8">
                            <div className="bg-white rounded-[3.5rem] shadow-2xl overflow-hidden border-[12px] border-white relative aspect-video group">
                                <img 
                                    key={data.image}
                                    src={data.image} 
                                    alt={data.name} 
                                    className="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-105"
                                />
                                <div className="absolute inset-0 bg-gradient-to-t from-black/70 via-black/10 to-transparent" />
                                <div className="absolute bottom-10 left-10 text-white animate-content">
                                    <span className="bg-blue-600/90 backdrop-blur-md px-5 py-1.5 rounded-full text-xs font-black uppercase tracking-widest mb-3 inline-block shadow-lg">Point {data.id}</span>
                                    <h2 className="text-5xl font-black drop-shadow-lg">{data.name}</h2>
                                </div>
                            </div>

                            {/* Signal Control Box */}
                            <div className="bg-white p-10 rounded-[3rem] shadow-lg border border-slate-100 relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-32 h-32 bg-blue-50 rounded-full -mr-16 -mt-16 opacity-50" />
                                <div className="relative z-10">
                                    <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-8 flex items-center gap-2">
                                        <div className="w-2 h-2 bg-blue-500 rounded-full animate-ping" />
                                        接收 micro:bit 數據中 (Topic: sml/runner/progress)
                                    </h3>
                                    <div className="flex items-center gap-8 mb-10">
                                        <button onClick={() => setSegment(s => Math.max(0, s - 1))} className="p-5 bg-slate-100 rounded-[1.5rem] hover:bg-blue-600 hover:text-white transition-all shadow-md active:scale-90">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                                        </button>
                                        <div className="flex-grow group relative h-3 bg-slate-100 rounded-full">
                                            <div className="absolute top-0 left-0 h-full bg-blue-600 rounded-full transition-all duration-300" style={{width: percent + '%'}}></div>
                                            <input 
                                                type="range" min="0" max="80" value={segment} 
                                                onChange={(e) => setSegment(parseInt(e.target.value))}
                                                className="absolute top-0 left-0 w-full h-full opacity-0 cursor-pointer z-10"
                                            />
                                        </div>
                                        <button onClick={() => setSegment(s => Math.min(80, s + 1))} className="p-5 bg-slate-100 rounded-[1.5rem] hover:bg-blue-600 hover:text-white transition-all shadow-md active:scale-90">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                                        </button>
                                    </div>
                                    <div className="grid grid-cols-5 gap-3 text-center">
                                        <p className="col-span-5 text-[10px] font-bold text-slate-300 italic mb-2 tracking-widest uppercase">手動測試按鈕</p>
                                        {[0, 20, 40, 60, 80].map(s => (
                                            <button key={s} onClick={() => setSegment(s)} className={`py-4 rounded-[1.2rem] font-black text-xs transition-all border-2 ${segment === s ? 'bg-slate-900 text-white border-slate-900 shadow-xl' : 'bg-white text-slate-400 border-slate-100 hover:border-blue-200'}`}>
                                                {s === 0 ? 'START' : s === 80 ? 'FINISH' : s + ' SEG'}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Right Side: Details */}
                        <div className="lg:col-span-5 flex flex-col">
                            <div className="bg-white rounded-[3rem] shadow-xl border border-slate-100 overflow-hidden flex flex-col h-full glass-effect">
                                <div className="p-4 bg-slate-50/50 m-6 rounded-[2rem] flex gap-2">
                                    <button onClick={() => setTab('info')} className={`flex-1 py-4 text-sm font-black rounded-[1.5rem] transition-all ${tab === 'info' ? 'bg-white text-blue-600 shadow-md ring-1 ring-blue-50' : 'text-slate-400 hover:text-slate-600'}`}>景點詳解</button>
                                    <button onClick={() => setTab('data')} className={`flex-1 py-4 text-sm font-black rounded-[1.5rem] transition-all ${tab === 'data' ? 'bg-white text-emerald-600 shadow-md ring-1 ring-emerald-50' : 'text-slate-400 hover:text-slate-600'}`}>挑戰數據</button>
                                </div>
                                
                                <div className="p-10 flex-grow overflow-y-auto">
                                    {tab === 'info' ? (
                                        <div className="space-y-10 animate-content">
                                            <div className="relative pl-10">
                                                <div className="absolute left-0 top-1 w-6 h-6 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-black text-[10px]">1</div>
                                                <h4 className="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-2">歷史人文 History</h4>
                                                <p className="font-bold text-slate-700 leading-relaxed text-lg tracking-tight">{data.history}</p>
                                            </div>
                                            <div className="relative pl-10">
                                                <div className="absolute left-0 top-1 w-6 h-6 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center font-black text-[10px]">2</div>
                                                <h4 className="text-[10px] font-black text-emerald-500 uppercase tracking-widest mb-2">地理環境 Geography</h4>
                                                <p className="font-bold text-slate-700 leading-relaxed text-lg tracking-tight">{data.geography}</p>
                                            </div>
                                            <div className="relative pl-10">
                                                <div className="absolute left-0 top-1 w-6 h-6 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center font-black text-[10px]">3</div>
                                                <h4 className="text-[10px] font-black text-amber-500 uppercase tracking-widest mb-2">文化特色 Culture</h4>
                                                <p className="font-bold text-slate-700 leading-relaxed text-lg tracking-tight">{data.culture}</p>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="space-y-8 animate-content">
                                            <div className="bg-slate-900 rounded-[2.5rem] p-10 text-white relative overflow-hidden shadow-2xl">
                                                <h4 className="text-[10px] text-slate-500 font-black uppercase mb-6 tracking-[0.3em]">Achievement</h4>
                                                <div className="flex justify-between items-end mb-6">
                                                    <span className="text-7xl font-black">{percent}<span className="text-2xl opacity-40 ml-1">%</span></span>
                                                    <div className="text-right">
                                                        <p className="text-[10px] text-slate-400 font-black mb-1">已跑里程</p>
                                                        <p className="text-2xl font-black text-blue-400">{dist} km</p>
                                                    </div>
                                                </div>
                                                <div className="w-full h-4 bg-white/10 rounded-full overflow-hidden p-1 border border-white/5">
                                                    <div className="h-full bg-gradient-to-r from-blue-400 to-indigo-500 rounded-full transition-all duration-1000 shadow-[0_0_20px_rgba(59,130,246,0.5)]" style={{width: percent + '%'}}></div>
                                                </div>
                                            </div>
                                            <div className="bg-blue-50 p-8 rounded-[2.5rem] border border-blue-100 flex justify-between items-center shadow-sm">
                                                <div>
                                                    <p className="text-[10px] text-blue-400 font-black uppercase mb-2 tracking-widest">剩餘路程</p>
                                                    <p className="text-4xl font-black text-blue-800">{(TOTAL_DISTANCE_KM - parseFloat(dist)).toFixed(2)} <span className="text-sm font-bold uppercase tracking-normal">km</span></p>
                                                </div>
                                                <div className="bg-white p-4 rounded-3xl text-blue-400 shadow-sm border border-blue-50">
                                                    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55.45 1 1 1h2c.55 0 1-.45 1-1v-2.34c3.23-.44 5.34-3.1 5-6.16a5.5 5.5 0 0 0-11 0c-.34 3.06 1.77 5.72 5 6.16Z"/></svg>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                                
                                <div className="bg-slate-900 p-8 flex justify-between items-center text-white border-t border-white/5">
                                    <div>
                                        <p className="text-[10px] text-slate-500 uppercase font-black tracking-[0.2em] mb-2">下一站預告</p>
                                        <p className="text-lg font-black text-blue-400">{milestones[Math.floor(segment / 5) + 1]?.name || '挑戰完成！'}</p>
                                    </div>
                                    <div className="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="text-blue-400"><path d="m9 18 6-6-6-6"/></svg>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <footer className="text-center py-16 text-slate-400 text-xs font-black border-t border-slate-200 mt-16 opacity-40">
                        <p className="uppercase tracking-[0.8em] mb-3">Sun Moon Lake Runner Project · 2026</p>
                        <p className="font-bold italic">結合物聯網感測與在地文史導覽的沉浸式教育系統</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
